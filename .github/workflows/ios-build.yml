name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: ./node_modules/.bin/cap sync ios

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .ipa
        run: |
          cd ios/App
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            exit 1
          fi
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../CASPO.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/CASPO.ipa
          if-no-files-found: error
